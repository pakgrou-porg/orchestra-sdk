# Musician Job Template
# This file is used as a template by the K8sRunner.
# The Conductor fills in ITERATION, HYPOTHESIS_SHA, and JOB_NAME at runtime.
#
# To test manually:
#   kubectl create -f k8s/musician-job-template.yaml -n orchestra

apiVersion: batch/v1
kind: Job
metadata:
  name: orchestra-musician-manual-test
  namespace: orchestra
  labels:
    app: orchestra-musician
    session: manual-test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        orchestra/gpu: "rtx4060"   # Target GPU node
      containers:
        - name: musician
          image: orchestra-musician:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "/workspace/train.py"]
          env:
            - name: ITERATION
              value: "0"
            - name: HYPOTHESIS_SHA
              value: "HEAD"
            - name: ORCHESTRA_SESSION
              value: "manual-test"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "16Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: datasets
              mountPath: /datasets
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: orchestra-workspace
        - name: datasets
          persistentVolumeClaim:
            claimName: orchestra-datasets
            readOnly: true
