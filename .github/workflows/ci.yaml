name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Python 3.13 is excluded until the `kubernetes` package publishes a
        # 3.13-compatible wheel (kubernetes>=29 does not yet ship one on PyPI).
        # Re-add "3.13" once https://github.com/kubernetes-client/python/issues/2138
        # is resolved and a wheel is available.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run type checks (mypy)
        run: mypy orchestra_sdk --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v
